server.port=8081
spring.application.name=auth-service

spring.datasource.url=jdbc:postgresql://localhost:5433/auth_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

rsa.private-key=classpath:keys/private_key.pem
rsa.public-key=classpath:keys/public_key.pem

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Bootstrap admin (dev)
bootstrap.admin.enabled=true
bootstrap.admin.email=admin@grh.local
bootstrap.admin.password=admin123

management.endpoints.web.exposure.include=health,info

